version: 2

updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    cooldown:
      default-days: 7
    groups:
      npm-version-updates:
        applies-to: "version-updates"
        patterns:
          - "*"
      npm-security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
    open-pull-requests-limit: 1
    rebase-strategy: "auto"
    versioning-strategy: "increase-if-necessary"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
